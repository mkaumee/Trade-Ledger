<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Ledger - Login</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login/Registration Container -->
    <div class="auth-container">
        <!-- Login Form -->
        <div id="login-section" class="auth-section active">
            <div class="auth-card">
                <div class="auth-header">
                    <i class="fas fa-chart-line"></i>
                    <h1>Trader Ledger</h1>
                    <p>Profit & Debt Tracking System</p>
                </div>
                <form id="login-form">
                    <h2>Login to Your Account</h2>
                    
                    <label for="login-email">Email:</label>
                    <input type="email" id="login-email" name="email" placeholder="your@email.com" required>

                    <label for="login-password">Password:</label>
                    <input type="password" id="login-password" name="password" placeholder="Enter your password" required>

                    <button type="submit">Login</button>
                    
                    <p class="auth-switch">
                        Don't have an account? 
                        <a href="#" id="show-register">Register here</a>
                    </p>
                </form>
            </div>
        </div>

        <!-- Registration Form -->
        <div id="register-section" class="auth-section">
            <div class="auth-card">
                <div class="auth-header">
                    <i class="fas fa-chart-line"></i>
                    <h1>Trader Ledger</h1>
                    <p>Register Your Business</p>
                </div>
                <form id="register-form">
                    <h2>Create Business Account</h2>
                    
                    <label for="reg-business-name">Business Name:</label>
                    <input type="text" id="reg-business-name" name="businessName" placeholder="Your Business Name" required>

                    <label for="reg-business-type">Business Type:</label>
                    <select id="reg-business-type" name="businessType" required>
                        <option value="">Select business type</option>
                        <option value="retail">Retail</option>
                        <option value="wholesale">Wholesale</option>
                        <option value="services">Services</option>
                        <option value="manufacturing">Manufacturing</option>
                        <option value="other">Other</option>
                    </select>

                    <label for="reg-owner-name">Owner Name:</label>
                    <input type="text" id="reg-owner-name" name="ownerName" placeholder="Your full name" required>

                    <label for="reg-email">Email:</label>
                    <input type="email" id="reg-email" name="email" placeholder="your@email.com" required>

                    <label for="reg-phone">Phone Number:</label>
                    <input type="tel" id="reg-phone" name="phone" placeholder="+1234567890" required>

                    <label for="reg-address">Business Address:</label>
                    <input type="text" id="reg-address" name="address" placeholder="Street address" required>

                    <label for="reg-password">Password:</label>
                    <input type="password" id="reg-password" name="password" placeholder="Create a password" required minlength="6">

                    <label for="reg-confirm-password">Confirm Password:</label>
                    <input type="password" id="reg-confirm-password" name="confirmPassword" placeholder="Re-enter password" required minlength="6">

                    <button type="submit">Register Business</button>
                    
                    <p class="auth-switch">
                        Already have an account? 
                        <a href="#" id="show-login">Login here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
