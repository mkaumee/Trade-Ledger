<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#2e7d32"/>
  
  <!-- Ledger book -->
  <rect x="25" y="30" width="50" height="40" rx="2" fill="#ffffff"/>
  
  <!-- Book spine -->
  <rect x="25" y="30" width="5" height="40" fill="#1b5e20"/>
  
  <!-- Ledger lines -->
  <line x1="35" y1="40" x2="70" y2="40" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="35" y1="47" x2="70" y2="47" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="35" y1="54" x2="70" y2="54" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="35" y1="61" x2="70" y2="61" stroke="#2e7d32" stroke-width="1.5"/>
  
  <!-- Naira symbol (₦) -->
  <text x="50" y="88" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#66bb6a" text-anchor="middle">₦</text>
</svg>
